<div id="main-outlet">
  <div class="container" id="main-container">
    <div class="global-notice">
      <div class="alert alert-info alert-global-notice">
        <span class="text">Fixture community notice.</span>
      </div>
    </div>
  </div>

  <div class="list-controls">
    <h1 id="topic-list-heading" class="sr-only">All latest topics</h1>
    <ul id="navigation-bar" class="nav nav-pills">
      <li class="active latest nav-item_latest">
        <a href="/latest" class="active" aria-current="page">Latest</a>
      </li>
      <li class="top nav-item_top">
        <a href="/top">Top</a>
      </li>
    </ul>
  </div>

  <div class="container list-container --topic-list">
    <table class="topic-list" aria-labelledby="topic-list-heading">
      <thead class="topic-list-header">
        <tr>
          <th scope="col" class="topic-list-data default">Topic</th>
          <th scope="col" class="topic-list-data posts sortable num">Replies</th>
          <th scope="col" class="topic-list-data views sortable num">Views</th>
          <th scope="col" class="topic-list-data activity sortable num">Activity</th>
        </tr>
      </thead>
      <tbody class="topic-list-body">
        <tr data-topic-id="fixture-id-1" class="topic-list-item category-feedback has-excerpt pinned tag-announcement">
          <td class="main-link topic-list-data">
            <span class="link-top-line" role="heading" aria-level="2">
              <span class="topic-statuses">
                <span title="Pinned topic" class="topic-status --pinned"></span>
              </span>
              <a href="/t/fixture-latest-topic/1001" data-topic-id="fixture-id-1" class="title raw-link raw-topic-link">
                <span dir="auto">Fixture latest pinned topic</span>
              </a>
            </span>
            <span class="link-bottom-line">
              <a class="badge-category__wrapper" href="/c/feedback/2">
                <span data-category-id="fixture-id-2" class="badge-category --style-icon">
                  <span class="badge-category__name">Feedback</span>
                </span>
              </a>
            </span>
          </td>
          <td class="num posts-map posts topic-list-data">12</td>
          <td class="num views topic-list-data">345</td>
          <td title="Latest: fixture date" class="activity num topic-list-data age">1h</td>
        </tr>
        <tr data-topic-id="fixture-id-3" class="topic-list-item category-develop tag-ai">
          <td class="main-link topic-list-data">
            <span class="link-top-line" role="heading" aria-level="2">
              <span class="topic-statuses"></span>
              <a href="/t/fixture-latest-topic/1002" data-topic-id="fixture-id-3" class="title raw-link raw-topic-link">
                <span dir="auto">Fixture latest regular topic</span>
              </a>
            </span>
          </td>
          <td class="num posts-map posts topic-list-data">3</td>
          <td class="num views topic-list-data">89</td>
          <td title="Created: fixture date" class="activity num topic-list-data age">5m</td>
        </tr>
      </tbody>
    </table>
  </div>
